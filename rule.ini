; Gemini test
custom_proxy_group=🌍 Gemini`url-test`^(?=.*(->|→))(?!.*(🇺🇸|🇷🇺|🇭🇰|美国|美西|美东|俄罗斯|香港|\bUS\b|\bUSA\b|\bRU\b|\bHK\b|IPv6)).*$`http://cp.cloudflare.com/generate_204`60,,120

; 基础架构
custom_proxy_group=🎯 全球直连`select`[]DIRECT
custom_proxy_group=🛑 广告拦截`select`[]REJECT
