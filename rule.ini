; rulset 由 <指定的custom_proxy_group> <匹配 url 或 ip 的逻辑 list> 组成，后者都会通过前者指定的节点访问
; custom_proxy_group 由 <名称> <切换逻辑> <其他custom_proxy_group 或 匹配关键字节点> <url-test针对的网站, 延迟切换时间等> 组成，每个 custom_proxy_group 返回一个节点
; 所以是先有custom_proxy_group，再有 ruleset

; 自定义 ruleset
; 自定义的指定翻墙列表，最高优先级
ruleset=♻️ 国别故障转移,https://raw.githubusercontent.com/wmgylc/clash_rule/main/custom_proxy.list
; 自定义的全球直连列表，最高优先级
ruleset=🎯 全球直连,https://raw.githubusercontent.com/wmgylc/clash_rule/main/custom_direct.list
; 自定义的拦截列表，最高优先级
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/wmgylc/clash_rule/main/custom_reject.list
; 原list配置了v2ray走翻墙，此处改为直连
ruleset=🎯 全球直连,https://raw.githubusercontent.com/wmgylc/clash_rule/main/direct_fork_ios_rule_script.list

; gemini test
ruleset=🌍 Gemini,https://raw.githubusercontent.com/wmgylc/clash_rule/refs/heads/main/gemini.list

